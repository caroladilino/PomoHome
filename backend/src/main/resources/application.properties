# =====================================================================
# PomoHome backend configuration
# ---------------------------------------------------------------------
# This file is read automatically by Spring Boot at startup.
# Anything you put here is available via @Value or via @ConfigurationProperties.
# =====================================================================

# ----- HTTP server -----
# The game (LibGDX client) will hit http://localhost:8080 by default.
server.port=8080

# ----- Database (H2, embedded) -----
# url -> "file:./data/pomohome" means H2 will create a real file under
#        <project root>/data/pomohome.mv.db, so data SURVIVES restarts.
#        If you'd rather wipe the DB on every restart (handy during early
#        development), swap to:   jdbc:h2:mem:pomohome
spring.datasource.url=jdbc:h2:file:./data/pomohome
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ----- JPA / Hibernate -----
# ddl-auto=update   -> Hibernate creates/updates tables to match @Entity
#                      classes. Great for prototyping. For production you
#                      would use Flyway/Liquibase migrations instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----- H2 web console -----
# Browse http://localhost:8080/h2-console after `bootRun`.
# Use JDBC URL: jdbc:h2:file:./data/pomohome  (same as above)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
